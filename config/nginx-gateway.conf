
# ── Real IP extraction ─────────────────────────────────────────────────────
# Cloudflare sits in front; the real client IP arrives in CF-Connecting-IP.
# We declare all Cloudflare egress ranges as trusted so nginx replaces
# $remote_addr with the header value before rate-limit evaluation.
# Range source: https://www.cloudflare.com/ips/

geo $realip {
    default             $remote_addr;
    # Cloudflare IPv4
    103.21.244.0/22     $http_cf_connecting_ip;
    103.22.200.0/22     $http_cf_connecting_ip;
    103.31.4.0/22       $http_cf_connecting_ip;
    104.16.0.0/13       $http_cf_connecting_ip;
    104.24.0.0/14       $http_cf_connecting_ip;
    108.162.192.0/18    $http_cf_connecting_ip;
    131.0.72.0/22       $http_cf_connecting_ip;
    141.101.64.0/18     $http_cf_connecting_ip;
    162.158.0.0/15      $http_cf_connecting_ip;
    172.64.0.0/13       $http_cf_connecting_ip;
    173.245.48.0/20     $http_cf_connecting_ip;
    188.114.96.0/20     $http_cf_connecting_ip;
    190.93.240.0/20     $http_cf_connecting_ip;
    197.234.240.0/22    $http_cf_connecting_ip;
    198.41.128.0/17     $http_cf_connecting_ip;
    # Cloudflare IPv6
    2400:cb00::/32      $http_cf_connecting_ip;
    2606:4700::/32      $http_cf_connecting_ip;
    2803:f800::/32      $http_cf_connecting_ip;
    2405:b500::/32      $http_cf_connecting_ip;
    2405:8100::/32      $http_cf_connecting_ip;
    2a06:98c0::/29      $http_cf_connecting_ip;
    2c0f:f248::/32      $http_cf_connecting_ip;
}

# ── Rate-limit zones ───────────────────────────────────────────────────────
# 6 requests/minute per real IP  (burst of 2 handled smoothly)
# Shared memory zone holds ~160 000 IP states in 10 MB.
limit_req_zone $realip zone=per_ip:10m rate=6r/m;

events { worker_connections 256; }

http {
    # Pass real client IP to vLLM logs
    proxy_set_header  X-Real-IP         $realip;
    proxy_set_header  X-Forwarded-For   $realip;

    server {
        listen 80;

        # ── Block non-existent or dangerous endpoints ──────────────────────
        # Allow only the one path LexAI uses.
        location = /v1/chat/completions {

            # Rate limit: 6 req/min, smooth burst of 2, reject the rest with 429
            limit_req zone=per_ip burst=2 nodelay;
            limit_req_status 429;

            # Block oversized payloads (giant context injection attempts)
            client_max_body_size 256k;

            # Strip any client-supplied Authorization header so users cannot
            # probe vLLM internals using a spoofed key
            proxy_set_header  Authorization "";

            proxy_pass         http://vllm:8000;
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
        }

        # ── Silently drop everything else ─────────────────────────────────
        location / {
            return 403;
        }
    }
}
