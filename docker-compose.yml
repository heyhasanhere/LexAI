# Profiles:
#   lite  — cloud LLM provider or remote GPU (no local vLLM, no NVIDIA required)
#   full  — local Qwen3-4B on NVIDIA GPUs + rate-limited public gateway
#
# The installer writes .env and sets COMPOSE_PROFILES automatically.
# Manual usage:
#   COMPOSE_PROFILES=lite  docker compose up -d
#   COMPOSE_PROFILES=full  docker compose up -d

services:

  # ── Backing stores (both profiles) ────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16   # pgvector pre-installed
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ld
      POSTGRES_PASSWORD: ld
      POSTGRES_DB: lexai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ld -d lexai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application (both profiles) ───────────────────────────────────────────

  api:
    build: .
    image: lexai-app
    profiles: [lite, full]
    ports:
      - "8000:8000"
    volumes:
      - doc_data:/app/data/documents
      - huggingface_cache:/root/.cache/huggingface   # Marker + embedding models persist here
    env_file:
      - .env
    environment:
      - LD_STORAGE__POSTGRES_DSN=postgresql://ld:ld@postgres:5432/lexai
    command: uvicorn src.api.routes:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      vllm:
        condition: service_healthy
        required: false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ui:
    image: lexai-app
    profiles: [lite, full]
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - LEXAI_API_URL=http://api:8000
    command: >
      streamlit run src/ui/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    depends_on:
      api:
        condition: service_healthy

  # ── Local GPU inference + public gateway (full profile only) ──────────────

  vllm:
    image: vllm/vllm-openai:latest
    profiles: [full]
    # NOT exposed on host — nginx is the only entry point
    expose:
      - "8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command: >
      --model Qwen/Qwen3-4B-AWQ
      --tensor-parallel-size 2
      --max-model-len 16384
      --gpu-memory-utilization 0.70
      --dtype bfloat16
      --enforce-eager
      --max-num-seqs 4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # Rate-limiting gateway — exposes port 8090 for the Cloudflare tunnel
  gateway:
    image: nginx:alpine
    profiles: [full]
    ports:
      - "127.0.0.1:8090:80"   # only loopback — Cloudflare tunnel connects here
    volumes:
      - ./config/nginx-gateway.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      vllm:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  doc_data:
  huggingface_cache:
